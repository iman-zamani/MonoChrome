<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient VPS Browser</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: Arial, sans-serif; background: #111;}
        #toolbar { display: flex; padding: 10px; background: #222; color: white; gap: 10px; align-items: center;}
        #url-input { flex-grow: 1; padding: 5px; font-size: 16px; }
        button { padding: 5px 15px; cursor: pointer; font-size: 16px; }
        #status { font-size: 12px; color: #aaa; min-width: 150px; text-align: right;}
        
        #browser-view { 
            width: 100%; max-width: 800px; 
            margin: 0 auto; display: block; background: white; outline: none;
            image-rendering: pixelated; 
        }
    </style>
</head>
<body>

    <div id="toolbar">
        <input type="text" id="url-input" placeholder="Enter URL" onkeypress="handleEnter(event)">
        <button id="go-btn" onclick="goToUrl()">Go</button>
        <div id="status">Connecting...</div>
    </div>

    <img id="browser-view" tabindex="0" alt="Waiting for slow connection..." />

    <script>
        // Match the server's extreme patience settings
        const socket = io({ 
            auth: { password: "__SOCKET_PASSWORD__" },
            timeout: 120000 // Allow up to 2 minutes for connection attempts
        });
        
        const img = document.getElementById('browser-view');
        const statusEl = document.getElementById('status');
        const urlInput = document.getElementById('url-input');
        const goBtn = document.getElementById('go-btn');

        const VPS_WIDTH = 800;
        const VPS_HEIGHT = 600;
        let isWaitingForNetwork = false;

        socket.on('connect', () => {
            statusEl.innerText = 'Connected (Patient Mode)';
            statusEl.style.color = '#4CAF50';
        });

        socket.on('disconnect', () => {
            statusEl.innerText = 'Reconnecting...';
            statusEl.style.color = '#ff9800';
        });

        socket.on('frame_update', (frameData, callback) => {
            isWaitingForNetwork = false;
            goBtn.disabled = false;
            goBtn.innerText = "Go";
            img.src = 'data:image/png;base64,' + frameData;
            
            // Wait slightly before acknowledging to allow the UI to paint
            setTimeout(() => { callback(true); }, 50);
        });

        // --- NEW: Receive copied text from the VPS ---
        socket.on('vps_copied', (text) => {
            if (navigator.clipboard) {
                navigator.clipboard.writeText(text).then(() => {
                    console.log("Copied from VPS to local clipboard!");
                    statusEl.innerText = "Copied to clipboard!";
                    setTimeout(() => { statusEl.innerText = 'Connected (Patient Mode)'; }, 2000);
                }).catch(err => {
                    console.error("Browser blocked clipboard write.", err);
                });
            }
        });

        function goToUrl() {
            if (isWaitingForNetwork) return; 
            let url = urlInput.value.trim();
            if (!url) return;
            if (!url.startsWith('http')) url = 'https://' + url;
            
            isWaitingForNetwork = true;
            goBtn.disabled = true;
            goBtn.innerText = "Wait...";
            
            img.src = "";
            img.alt = "Loading " + url + "...";
            
            socket.emit('navigate', url);
            img.focus(); 
        }

        function handleEnter(e) { if (e.key === 'Enter') goToUrl(); }

        img.addEventListener('click', (event) => {
            if (isWaitingForNetwork) return;
            const rect = img.getBoundingClientRect();
            const scaleX = VPS_WIDTH / rect.width;
            const scaleY = VPS_HEIGHT / rect.height;

            const realX = Math.round((event.clientX - rect.left) * scaleX);
            const realY = Math.round((event.clientY - rect.top) * scaleY);

            socket.emit('click', { x: realX, y: realY });
            img.focus();
        });

        img.addEventListener('wheel', (event) => {
            event.preventDefault(); 
            if (!isWaitingForNetwork) socket.emit('scroll', { deltaY: event.deltaY });
        }, { passive: false });

        // --- UPDATED: Keydown listener now handles Ctrl+V for pasting ---
        document.addEventListener('keydown', async (event) => {
            // Check for Paste (Ctrl+V / Cmd+V)
            if ((event.ctrlKey || event.metaKey) && event.key.toLowerCase() === 'v') {
                try {
                    const text = await navigator.clipboard.readText();
                    if (text) {
                        event.preventDefault();
                        socket.emit('paste', text);
                    }
                } catch (err) {
                    console.error("Failed to read local clipboard. Grant permissions.", err);
                }
                return;
            }

            // Normal typing when hovering/focusing the image
            if (document.activeElement === img && !isWaitingForNetwork) {
                // Don't scroll the physical page with arrows/space
                if(['Space', 'ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].indexOf(event.code) > -1) {
                    event.preventDefault();
                }
                // Ignore modifier keys by themselves
                if (event.key.length === 1 || ['Enter', 'Backspace', 'Tab', 'Escape', 'ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(event.key)) {
                     socket.emit('keypress', { key: event.key });
                }
            }
        });
    </script>
</body>
</html>
